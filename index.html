<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="Rgw3LmrjCSdjxw6giT1nchnX8AmARSUo6MVmC_im8y0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markov Chain Text Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        
        :root {
            --neon-green: #39ff14;
            --deep-blue: #1e3a8a;
            --highlight-yellow: #fde047;
            --accent-brown: #a85507;
        }

        body { 
            background-color: #000000; 
            color: #e2e8f0; 
            font-family: 'JetBrains Mono', monospace; 
            overflow-x: hidden;
        }

        .panel { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; position: relative; }
        
        /* SHARP HIGHLIGHTING FOR OUTPUT */
        #output span {
            display: inline-block;
            padding: 0 4px;
            margin: 2px 1px;
            border-radius: 3px;
            border: 1px solid #ddd; /* Subtle border for all words */
        }
        
        .word-pop { 
            background-color: var(--highlight-yellow) !important; 
            color: #000 !important;
            border: 1px solid var(--accent-brown) !important;
            box-shadow: 2px 2px 0px var(--accent-brown);
        }

        /* Horizontal Percentage Bars */
        .prob-bar-container {
            background: #111;
            padding: 8px;
            border-bottom: 1px solid #222;
        }
        .bar-bg { background: #222; height: 6px; width: 100%; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .bar-fill { background: var(--neon-green); height: 100%; transition: width 0.6s ease; }

        /* Diagram Zoom Area */
        #diagramContainer {
            cursor: grab;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 25px 25px;
        }
        #diagramContainer svg {
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .nav-btn {
            background: #1a1a1a; border: 1px solid #333; color: #888;
            padding: 2px 8px; font-size: 11px; transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--deep-blue); color: white; border-color: var(--neon-green); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--deep-blue); }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-[1600px] mx-auto">
    <header class="mb-8 border-l-4 border-[#a85507] pl-4">
        <h1 class="text-3xl font-bold text-white tracking-tighter">🔗 MARKOV CHAIN TEXT GENERATOR</h1>
        <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">
            Modeling <span class="text-[#fde047]">intelligent patterns</span> via stochastic state transitions
        </p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="panel p-5 border-t-2 border-[#1e3a8a]">
                <h3 class="text-[10px] font-bold text-gray-500 mb-4 uppercase">Build Markov Chain</h3>
                <textarea id="inputText" class="w-full h-32 bg-black border border-gray-800 rounded p-3 text-xs outline-none focus:border-[#39ff14]" spellcheck="false">Life is full of surprises. Life is a journey. Life is beautiful.</textarea>
                
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <input type="number" id="order" value="1" min="1" max="3" class="w-full bg-black border border-gray-800 p-2 text-xs text-[#39ff14]">
                    <button onclick="runSimulation()" class="bg-[#1e3a8a] hover:bg-[#a85507] text-white text-[11px] font-bold py-2 uppercase tracking-widest">Generic Text</button>
                </div>
            </div>

            <div class="panel p-5 h-[450px] flex flex-col">
                <h3 class="text-[10px] font-bold text-gray-500 mb-4 uppercase">Transition Probabilities</h3>
                <div id="probPanel" class="flex-grow overflow-y-auto"></div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="panel p-6 bg-white overflow-hidden shadow-[0_0_20px_rgba(30,58,138,0.3)]">
                <div class="absolute top-0 right-0 bg-[#a85507] text-white text-[9px] px-2 py-1 font-bold uppercase">Generated Output</div>
                <div id="output" class="text-lg text-black"></div>
            </div>

            <div class="panel h-[550px] border border-gray-800 overflow-hidden flex flex-col">
                <div class="bg-[#111] p-2 border-b border-gray-800 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-gray-400 font-bold uppercase ml-2">Architecture Map</span>
                        <div class="flex gap-1 ml-4">
                            <button onclick="moveDiagram(0, 60)" class="nav-btn">↑</button>
                            <button onclick="moveDiagram(0, -60)" class="nav-btn">↓</button>
                            <button onclick="moveDiagram(60, 0)" class="nav-btn">←</button>
                            <button onclick="moveDiagram(-60, 0)" class="nav-btn">→</button>
                            <button onclick="adjustZoom(1.2)" class="nav-btn">+</button>
                            <button onclick="adjustZoom(0.8)" class="nav-btn">-</button>
                            <button onclick="resetView()" class="nav-btn text-[#fde047]">RESET</button>
                        </div>
                    </div>
                </div>
                <div id="diagramContainer"></div>
            </div>
        </div>
    </div>
</div>

<script>
    mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: { primaryColor: '#1e3a8a', edgeLabelBackground:'#000', fontSize: '14px' } });

    let scale = 1, pointX = 0, pointY = 0;
    const container = document.getElementById("diagramContainer");

    function updateTransform() {
        const target = container.querySelector('svg');
        if(target) target.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
    }

    function adjustZoom(f) { scale *= f; scale = Math.min(Math.max(0.2, scale), 5); updateTransform(); }
    function moveDiagram(dx, dy) { pointX += dx; pointY += dy; updateTransform(); }
    function resetView() { scale = 1; pointX = 0; pointY = 0; updateTransform(); }

    let isDragging = false, startPos = { x: 0, y: 0 };
    container.onmousedown = (e) => { isDragging = true; startPos = { x: e.clientX - pointX, y: e.clientY - pointY }; container.style.cursor = "grabbing"; };
    window.onmousemove = (e) => { if (!isDragging) return; pointX = e.clientX - startPos.x; pointY = e.clientY - startPos.y; updateTransform(); };
    window.onmouseup = () => { isDragging = false; container.style.cursor = "grab"; };

    function runSimulation() {
        const text = document.getElementById('inputText').value;
        const order = parseInt(document.getElementById('order').value);
        const tokens = text.split(/\s+/).filter(t => t.length > 0);
        if (tokens.length < order) return;

        let model = {};
        for (let i = 0; i <= tokens.length - order; i++) {
            let state = tokens.slice(i, i + order).join(" ");
            let next = tokens[i + order];
            if (!next) continue;
            if (!model[state]) model[state] = [];
            model[state].push(next);
        }

        let currentState = tokens.slice(0, order).join(" ");
        let result = [...tokens.slice(0, order)];
        for (let i = 0; i < 20; i++) {
            let options = model[currentState];
            if (!options) break;
            let next = options[Math.floor(Math.random() * options.length)];
            result.push(next);
            currentState = result.slice(-order).join(" ");
        }

        // OUTPUT WITH HIGHLIGHTING
        document.getElementById('output').innerHTML = result.map(word => {
            const isPop = Math.random() > 0.8;
            return `<span class="${isPop ? 'word-pop' : ''}">${word}</span>`;
        }).join(" ");

        let probHTML = "";
        for (let state in model) {
            let counts = {};
            model[state].forEach(n => counts[n] = (counts[n] || 0) + 1);
            probHTML += `<div class="text-[9px] text-[#a85507] font-bold mt-4 mb-1 uppercase tracking-tighter">If word is: "${state}"</div>`;
            for (let word in counts) {
                let perc = ((counts[word] / model[state].length) * 100).toFixed(0);
                probHTML += `
                <div class="prob-bar-container">
                    <div class="flex justify-between text-[10px]">
                        <span class="text-gray-400">Next: <span class="text-white">${word}</span></span>
                        <span class="text-[#39ff14]">${perc}%</span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill" style="width: ${perc}%"></div></div>
                </div>`;
            }
        }
        document.getElementById('probPanel').innerHTML = probHTML;

        renderDiagram(model);
    }

    async function renderDiagram(model) {
        let graphDef = "graph LR\n";
        let count = 0;
        const seenEdges = new Set();
        for (let state in model) {
            if (count++ > 15) break;
            let sId = state.replace(/\W/g, '');
            [...new Set(model[state])].forEach(next => {
                let tId = next.replace(/\W/g, '');
                if (!seenEdges.has(`${sId}-${tId}`)) {
                    graphDef += `  ${sId}("${state}") --> ${tId}("${next}")\n`;
                    seenEdges.add(`${sId}-${tId}`);
                }
            });
        }
        container.innerHTML = `<div class="mermaid">${graphDef}</div>`;
        await mermaid.run();
        resetView();
    }

    window.onload = runSimulation;
</script>
</body>
</html>
